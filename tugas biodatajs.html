<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <h1>Biodata</h1>
    <div id="Number"></div>
    <div id="string"></div>
    <div id="number"></div>
    <div id="array"></div>

    <h2>Storyteling</h2>
    <div id="object"></div>


    <script>
        var NIM =  15240661
        var nama = "Arya Kurniawan"
        var usia = 20
        var hobi = ['Membaca Buku','Musik', 'Editing Video' ] 

        
        var obj = { name : 'Arya Kurniawan', age : 20 }


        document.getElementById("Number").innerHTML ="Nim : " + NIM;
        document.getElementById("string").innerHTML ="Nama : " + nama;
        document.getElementById("number").innerHTML ="Usia : " + usia;
        document.getElementById("array").innerHTML =" Hobi : " + hobi;
        document.getElementById("object").innerHTML ="Hallo perkenalkan nama saya " + obj.name + " usia " + obj.age + ", dan saya suka membaca buku dan editing";
        

    </script>

    
</body>
